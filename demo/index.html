<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tweakpane Compact Kit - Demo</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        background: #000;
        color: #fff;
        display: grid;
        place-items: start center;
      }

      .wrap {
        box-sizing: border-box;
        font: 13px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        max-width: 100%;
        padding: 16px;
        position: relative;
        width: 336px;
      }

      .capture-bar {
        align-items: center;
        display: flex;
        gap: 8px;
        margin: 0 0 12px;
      }

      .capture-bar button {
        background: #17191f;
        border: 1px solid #2a313d;
        border-radius: 4px;
        color: #d7e4ef;
        cursor: pointer;
        font: inherit;
        padding: 6px 10px;
      }

      .capture-bar button:disabled {
        cursor: default;
        opacity: 0.6;
      }

      .capture-status {
        color: #92a2b5;
        font-size: 12px;
      }

      .demo-section {
        margin: 0 0 16px;
      }

      .title {
        font-size: 14px;
        font-weight: 700;
        margin: 0 0 8px;
      }

      .subtitle {
        margin: 0 0 12px;
      }

      .pane-host {
        box-sizing: border-box;
        min-height: 120px;
        width: 320px;
      }

      .capture-root {
        display: grid;
        gap: 16px;
        left: -20000px;
        pointer-events: none;
        position: absolute;
        top: 0;
        width: 336px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div id="showcase-root"></div>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
